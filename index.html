<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FPS for All - Neon Evolution</title>
  <style>
    :root { --primary: #3498db; --accent: #f1c40f; --danger: #e74c3c; --success: #2ecc71; --bg: #0a0a0c; }
    body, html { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; touch-action: none; height: 100%; width: 100%; color: white; }
    #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    
    canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; background: #050505; }
    
    .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(15,15,20,0.9) 0%, rgba(5,5,5,1) 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; text-align: center; backdrop-filter: blur(8px); }
    .hidden { display: none !important; }
    
    button { padding: 14px 28px; margin: 10px; font-size: 16px; cursor: pointer; background: rgba(255,255,255,0.05); border: 1px solid var(--primary); color: white; border-radius: 12px; min-width: 220px; transition: 0.3s; font-weight: 600; text-transform: uppercase; }
    button:hover { background: var(--primary); box-shadow: 0 0 20px var(--primary); transform: translateY(-2px); }
    
    input { padding: 16px; border-radius: 12px; border: 1px solid var(--primary); width: 280px; text-align: center; font-size: 18px; background: rgba(0,0,0,0.5); color: white; margin-bottom: 15px; }

    .shop-container { display: flex; flex-wrap: wrap; justify-content: center; max-width: 900px; gap: 15px; padding: 20px; max-height: 60vh; overflow-y: auto; }
    .shop-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); width: 240px; }
    
    .skin-grid { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
    .skin-dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; }
    .skin-dot.active { border-color: white; box-shadow: 0 0 10px white; transform: scale(1.1); }

    #ui-hud { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; }
    .hud-card { background: rgba(0,0,0,0.6); padding: 8px 15px; border-left: 4px solid var(--primary); border-radius: 4px; margin-bottom: 5px; font-weight: bold; backdrop-filter: blur(4px); }
    
    #joysticks { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 50px; box-sizing: border-box; z-index: 15; pointer-events: none; }
    .joystick { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(52,152,219,0.3); border-radius: 50%; position: relative; pointer-events: auto; touch-action: none; }
    .joystick .inner { width: 50px; height: 50px; background: var(--primary); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--primary); }

    #pause-btn { position: absolute; top: 20px; right: 20px; z-index: 25; width: 60px; min-width: 60px; background: rgba(0,0,0,0.5); }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="login-screen" class="overlay-screen">
      <h1 style="color:var(--primary); letter-spacing: 4px;">NEON EVOLUTION</h1>
      <input type="text" id="player-name-input" placeholder="Nome do Piloto...">
      <button id="btn-login" onclick="saveInitialName()">ENTRAR NO SISTEMA</button>
    </div>

    <div id="menu-screen" class="overlay-screen hidden">
      <h2 id="display-player-name" style="color: var(--primary);"></h2>
      <button onclick="startGame()" style="background: var(--primary); color: #000;">INICIAR PARTIDA</button>
      <button onclick="toggleScreen('shop-screen')">LOJA E SKINS</button>
      <button onclick="toggleScreen('leaderboard-screen'); loadLeaderboard();">RANKING</button>
      <button onclick="changeName()">TROCAR PILOTO</button>
      <p id="menu-stats" style="margin-top: 20px; color: var(--accent);"></p>
    </div>

    <div id="shop-screen" class="overlay-screen hidden">
      <h1 style="color: var(--accent);">ARSENAL</h1>
      <p>CRÉDITOS DISPONÍVEIS: <span id="shop-coins-val" style="color: var(--success); font-weight: bold;">0</span></p>
      <div class="shop-container">
        <div class="shop-item">
          <strong>PODER DE FOGO</strong><p id="damage-status"></p>
          <button id="btn-buy-damage" onclick="buyDamage()">UPGRADE</button>
        </div>
        <div class="shop-item">
          <strong>CADÊNCIA</strong><p id="fire-status"></p>
          <button id="btn-buy-fire" onclick="buyFireRate()">UPGRADE</button>
        </div>
        <div class="shop-item">
          <strong>ÍMÃ DE MOEDAS</strong><p id="magnet-status"></p>
          <button id="btn-buy-magnet" onclick="buyMagnet()">UPGRADE</button>
        </div>
        <div class="shop-item">
          <strong>NÚCLEO DE VIDA</strong><p id="health-status"></p>
          <button id="btn-buy-health" onclick="buyHealthUpgrade()">UPGRADE</button>
        </div>
        <div class="shop-item" style="width:100%">
          <strong>CUSTOMIZAÇÃO (SKINS)</strong>
          <div class="skin-grid">
            <div class="skin-dot" style="background:#3498db" onclick="setSkin('#3498db')"></div>
            <div class="skin-dot" style="background:#e67e22" onclick="setSkin('#e67e22')"></div>
            <div class="skin-dot" style="background:#2ecc71" onclick="setSkin('#2ecc71')"></div>
            <div class="skin-dot" style="background:#f1c40f" onclick="buySkin('#f1c40f', 1000)"></div>
            <div class="skin-dot" style="background:#e74c3c" onclick="buySkin('#e74c3c', 2000)"></div>
          </div>
        </div>
      </div>
      <button onclick="toggleScreen('menu-screen')">VOLTAR</button>
    </div>

    <div id="ui-hud" class="hidden">
      <div class="hud-card" id="wave-display">WAVE 1</div>
      <div class="hud-card" id="health-display" style="border-color:var(--danger)">SAÚDE: 100%</div>
      <div class="hud-card" id="score-display">SCORE: 0</div>
      <div class="hud-card" id="coins-display" style="border-color:var(--accent)">CRÉDITOS: 0</div>
      <div id="bonus-display" class="hud-card" style="border-color:var(--success); display:none">X2 ATIVO!</div>
    </div>

    <div id="pause-screen" class="overlay-screen hidden">
      <h1>PAUSA</h1>
      <button onclick="resumeGame()">RETOMAR</button>
      <button onclick="quitGame()">ABANDONAR</button>
    </div>

    <div id="gameover-screen" class="overlay-screen hidden">
      <h1 style="color:var(--danger)">MISSÃO FRACASSADA</h1>
      <div id="gameover-stats"></div>
      <button onclick="location.reload()">RECONECTAR</button>
    </div>

    <div id="leaderboard-screen" class="overlay-screen hidden">
      <h1>MELHORES PILOTOS</h1>
      <table style="width:80%; border-collapse: collapse;"><tbody id="leaderboard-body"></tbody></table>
      <button onclick="toggleScreen('menu-screen')">VOLTAR</button>
    </div>

    <button id="pause-btn" class="hidden" onclick="pauseGame()">||</button>
    <canvas id="game-canvas"></canvas>

    <div id="joysticks" class="hidden">
      <div id="move-joystick" class="joystick"><div class="inner"></div></div>
      <div id="shoot-joystick" class="joystick"><div class="inner"></div></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="game.js"></script>
</body>
</html>
